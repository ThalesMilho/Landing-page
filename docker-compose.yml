services:
  hospital-db:
    image: postgres:15-alpine
    container_name: hospital-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
      - POSTGRES_DB=hospital_db
    ports:
      - "3000:3001"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hospital-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  hospital-api:
    build: ./hospital-api
    container_name: hospital-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres_password@hospital-db:5432/hospital_db?schema=public
      - UPLOAD_DIR=uploads
      - MAX_FILE_SIZE_MB=20
      - AZURE_TENANT_ID=mock-tenant-id-123
      - AZURE_CLIENT_ID=mock-client-id-456
      - AZURE_AUDIENCE=mock-audience-789
      - ALLOWED_ORIGIN=http://localhost:5173
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=200
      - LOG_LEVEL=info
    volumes:
      - ./hospital-api/uploads:/app/uploads
    depends_on:
      hospital-db:
        condition: service_healthy
    networks:
      - hospital-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  hospital-frontend:
    build: ./hospital-intranet
    container_name: hospital-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      hospital-api:
        condition: service_healthy
    networks:
      - hospital-network

networks:
  hospital-network:
    driver: bridge

volumes:
  postgres_data:
  uploads:
